# Feature #5: GitHub Actions Cron Auto-Collection (07:00 / 14:00 KST)
name: Auto Collect Pipeline

on:
  schedule:
    # 07:00 KST = 22:00 UTC (previous day)
    - cron: '0 22 * * 1-5'
    # 14:00 KST = 05:00 UTC
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - full
          - dry-run

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run pipeline
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          if [ "$MODE" = "full" ]; then
            python run_engine.py --full
          elif [ "$MODE" = "dry-run" ]; then
            python run_engine.py --dry-run
          else
            python run_engine.py
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results-${{ github.run_number }}
          path: |
            data/exports/
            data/logs/
          retention-days: 30
