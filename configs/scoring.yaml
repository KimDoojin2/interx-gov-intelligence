    - 자율형 공장
    - ax실증
    - ax 실증
    # 제조 AI
    - 제조ai
    - 제조 ai
    - 산업ai
    - 산업 ai
    - 제조인공지능
    # DT/디지털트윈
    - 디지털트윈
    - 디지털 트윈
    # 검사/안전/품질
    - 머신비전
    - 머신 비전
    - 비전검사
    - 비전 검사
    - 이상탐지
    - 이상 탐지
    - 중대재해
    - 제조안전
    # AX 관련
    - manufacturing-x
