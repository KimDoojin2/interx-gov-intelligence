# =============================================================================
# InterX BD Intelligence — 시트 정의 (9-sheet 아키텍처)
# BD 베테랑 판단 기준:
#   수집/영업: 01, 02, 03, 05
#   보고:      20
#   KPI/로그:  22, 93, 94, 96
# =============================================================================

sheets:

  # ① 전체 수집 공고 마스터 ─────────────────────────────────────────────────────
  opportunity_info:
    name: "01_영업기회_정보"
    columns:
      - 실행ID
      - 사이트
      - 공고명
      - 마감일
      - D-day
      - 마감여부
      - 주무부처
      - 수행기관
      - 예산
      - 적합도점수
      - 우선순위등급
      - 추천솔루션
      - 추천액션
      - 적합키워드
      - L3강공고
      - 파트너후보
      - 담당자
      - 검토상태
      - BD마일스톤
      - 신규여부
      - 변경여부
      - 경쟁사감지
      - 중복의심
      - 메모
      - 상세URL
      - 정기공고여부
      - 정기공고그룹

  # ② L3 직접 제안 대상 (동일 컬럼, 플래그=Y만 필터) ────────────────────────────
  l3_dealer:
    name: "02_L3강공고"
    same_as: "opportunity_info"

  # ③ 파트너 전달용 공고 (영업팀 공유) ─────────────────────────────────────────
  partner_share:
    name: "03_파트너전달"
    same_as: "opportunity_info"

  # ④ 긴급 마감 (D-7 이내) ──────────────────────────────────────────────────────
  urgent_notices:
    name: "05_긴급마감_공고"
    columns:
      - 사이트
      - 공고명
      - 마감일
      - D-day
      - 우선순위등급
      - 적합도점수
      - 추천솔루션
      - 추천액션
      - 예산
      - 담당자
      - 상세URL

  # ⑤ 요약 대시보드 (경영진/팀장 보고 — 수동 편집) ──────────────────────────────
  # 자동 기록 없음, KEEP_SHEETS 에 포함되어 cleanup 에서 보호됨
  summary_dashboard:
    name: "20_요약대시보드"
    columns:
      - 기준일
      - 항목
      - 값
      - 비고

  # ⑥ KPI 현황 (append — 이력 누적) ─────────────────────────────────────────────
  kpi:
    name: "22_KPI현황"
    columns:
      - 기준일
      - 구분
      - 지표
      - 값
      - 실행ID

  # ⑦ 사이트별 수집 통계 (append — 이력 누적) ───────────────────────────────────
  site_stats:
    name: "93_사이트별수집통계"
    columns:
      - 기준일
      - 실행ID
      - 사이트
      - 수집건수
      - 마감임박건수
      - L3건수
      - P1건수
      - P2건수
      - P3건수

  # ⑧ 실행 로그 (append — 이력 누적) ───────────────────────────────────────────
  execution_log:
    name: "94_실행로그"
    columns:
      - 실행ID
      - 실행시각
      - 단계
      - 상태
      - 소요초
      - 메시지

  # ⑨ 수집 에러 로그 (append — 이력 누적) ──────────────────────────────────────
  error_log:
    name: "96_수집에러로그"
    columns:
      - 실행ID
      - 실행시각
      - 사이트
      - 에러유형
      - 에러메시지

  # ⑩ 상태변경 로그 (P5: bizinfo_datalist.py 대비 보강) ────────────────────────
  # 공고의 검토상태/BD마일스톤 변경 시 이력 기록
  status_change_log:
    name: "97_상태변경로그"
    columns:
      - 변경일시
      - 실행ID
      - 공고ID
      - 공고명
      - 변경필드
      - 이전값
      - 변경값
      - 변경사유
      - 처리자
