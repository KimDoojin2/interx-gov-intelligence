#  경쟁사 정보
# ═══════════════════════════════════════════════════════════════════

competitors:
  domestic:
    - name: "삼성SDS"
      product: "Nexplant 3D eXcellence"
      focus: "설계 단계 3D 데이터 변환·통합·시각화, ERP·SCM/IoT 연계 DT"
    - name: "현대오토에버"
      product: "SDF(Software Defined Factory)"
      focus: "MES, APS, SD Brain(AI Agent), DT, 통합 PHM 등 제조 통합 아키텍처"
    - name: "유비씨(UVC)"
      product: "OCTOPUS"
      focus: "데이터 수집~피지컬 AI 전주기 연결, 실시간 돌발 변수 대응"
    - name: "엠아이큐브솔루션"
      product: "Smart Digital Twin"
      focus: "P4R 데이터 파이프라인, 휴리스틱 APS, What-if 시뮬레이션"
    - name: "브이엠에스솔루션스"
      product: "MOZART"
      focus: "DES 엔진 기반 What-if 시뮬레이션, S&OP 통합, 병목 탐지"
    - name: "마키나락스"
      product: "설비 이상 탐지 솔루션"
      focus: "PLC/MES 데이터 실시간 분석, 이상징후 탐지, 조치 방안 제공"

  global:
    - name: "Siemens"
      product: "Opcenter / Industrial Copilot"
      focus: "APS·MES·품질관리 통합 MOM, DT 기반 계획-실행 폐쇄루프"
    - name: "Microsoft"
      product: "Azure Digital Twins / Foundry Agent Service"
      focus: "DT 모델링, 엣지 데이터 수집, 온톨로지 기반 의미모델링, 멀티에이전트"
    - name: "Bosch"
      product: "BMG Manufacturing Solutions"
      focus: "MBSE 기반 디지털 백본, 계층별 시뮬레이션, 시나리오 가상 검증"
    - name: "Dassault Systèmes"
      product: "3DEXPERIENCE / DELMIA"
      focus: "제품 수명주기 가상-현실 폐루프, DELMIA Apriso MES, Quintiq APS"

  interx_differentiation: >
    삼성SDS, 현대오토에버 등 대형 ICT 기업들이 통합 플랫폼을 공급 중이나,
    현장 설비(PLC/RMS)와 연동하여 공정 레시피를 자율 보정하는 '도메인 특화형 AI 에이전트' 분야는
    인터엑스와 같은 전문 벤처와 제조 기업 간의 컨소시엄이 시장을 선도 중.
    인터엑스는 AAS 표준 기술과 산업용 LLM 기반 의사결정 엔진을 결합하여
    데이터 수집·분석 수준(Level 2~3)을 넘어 완전 자율 제어(Level 4) 구현이 가능한 점이 핵심 차별점.

