# ═══════════════════════════════════════════════════════════════════
#  InterX 회사 지식베이스 — 사업계획서 AI 생성기 전용
#  실제 사업계획서 5건에서 추출한 핵심 콘텐츠
# ═══════════════════════════════════════════════════════════════════

company:
  name: "(주)인터엑스"
  name_en: "InterX Co., Ltd."
  established: 2019
  ceo: "박정윤"
  location: "대전광역시"
  employees: 25
  type: "제조 AI / 스마트팩토리 전문기업"
  description: >
    인터엑스는 제조 특화 자산관리쉘(AAS) 표준 기술과 산업용 LLM 기반의 의사결정 엔진 기술을
    보유하고 있으며, 이를 제조 현장의 공정 인프라와 결합하여 적용 공정 범위 내 완전 자율 제어
    (Level 4) 구현이 가능한 제조 AI 전문기업이다.

  core_competency:
    - "AAS(Asset Administration Shell, IEC 63278-1) 기반 제조 데이터 표준화 기술 보유"
    - "산업용 LLM 기반 의사결정 엔진 개발 역량 (ReAct 추론, Tool Calling, RAG)"
    - "멀티-Agent 오케스트레이션 플랫폼 설계 및 구현 경험"
    - "온톨로지/지식그래프 기반 제조 도메인 semantic grounding 기술"
    - "FMEA 매핑 기술 — Failure Mode, Cause, Effect, RPN 정보를 온톨로지 객체로 변환"
    - "PM/MES/SPC/RMS/APS/DT 등 레거시 시스템 연계 기술"
    - "Edge AI / NPU 기반 실시간 추론 기술"
    - "제조 데이터 레이크 설계 및 ETL 파이프라인 구축 경험"
    - "Catena-X 기반 제조 데이터 스페이스 구축 경험"

  patents:
    - "제조 AI 공정 모니터링 관련 특허 다수 출원/등록"
    - "예지보전 관련 특허"
    - "데이터 표준화 관련 특허"
    - "NPU 기반 엣지 AI 관련 특허"

  certifications:
    - "기업부설연구소 보유"
    - "벤처기업 인증"
    - "이노비즈 인증"

# ═══════════════════════════════════════════════════════════════════
#  솔루션 상세 역량 — 실제 사업계획서 수준의 기술 설명
# ═══════════════════════════════════════════════════════════════════

solutions:
  multi_agent_platform:
    name: "산업 특화 멀티-Agent 오케스트레이션 플랫폼"
    description: >
      설비·공정·검사·품질·생산계획 데이터를 통합 해석하고 현장 시스템과 연계하는
      산업 특화 멀티-Agent 시스템. 전문 Agent(생산관리, 예지보전, 품질 분석, 공정자동화,
      생산계획)와 이를 조율하는 오케스트레이션 Agent, 그리고 지식 그래프 기반 체계로 구성.
    agents:
      - name: "생산관리 Agent"
        role: "공정 병목/WIP 주기적 진단, 이벤트 기반 병목 및 WIP 구간 식별"
        tech: "MES 작업 이력, 설비 상태 로그, 공정별 처리시간/대기시간 분석"
      - name: "예지보전 Agent"
        role: "다변량 센서 기반 상황 인지 및 PM 연계형 설비 고장 예측"
        tech: "진동/온도/전류 데이터 기반 RUL 예측, PM 시스템 자동 업데이트"
      - name: "품질 분석 Agent"
        role: "SPC/RMS 연계 검사·품질분석, Top-N 원인계 추정"
        tech: "온톨로지/FMEA 기반 원인 추론, DT 시뮬레이션 검증"
      - name: "공정자동화 Agent"
        role: "AI 예측 결과 기반 Recipe 실행 연계형 자동 공정 제어"
        tech: "RMS 변수 업데이트, Recipe 자동 보정, 실행 모니터링"
      - name: "생산계획 Agent"
        role: "APS/DT 연계 자율 생산계획 수립 및 최적화"
        tech: "APS 시뮬레이터 호출, What-if 시뮬레이션, MES 반영"
      - name: "오케스트레이션 Agent"
        role: "이벤트 기반 Agent 라우팅 및 실행 흐름 제어"
        tech: "시나리오별 Agent 호출 순서 결정, 전역 상태 관리, HITL 승인 구조"
    architecture: >
      각 Agent가 시나리오별로 필요한 Tool을 선택·호출하여 독립적으로 분석·판단을 수행하고,
      상위 Agent의 결과가 하위 Agent의 후속 실행으로 이어질 수 있도록 Agentic Workflow 구조를
      구현. 오케스트레이션 Agent가 생산계획 변경, 설비 이상, 품질 이상, Recipe 변경, SPC 등록
      등 입력 이벤트를 인지하고 적합한 Agent 호출 순서와 실행 경로를 제어.
    safety: >
      고위험 조치 또는 현장 반영 전 검토가 필요한 경우 Human-in-the-loop 기반 승인 구조를
      적용하여 초기 실증 단계의 안전성과 신뢰성을 확보. Agent 실행 이력, 승인/반려 이력,
      재시도 이력, 결과 피드백을 누적 관리.

  ontology_knowledge:
    name: "온톨로지 기반 산업현장 지식체계"
    description: >
      설비, 공정, 검사, 품질, 생산계획, 보전 이력 등 이종 제조 데이터를 통합 관리할 수 있도록
      산업현장 데이터 항목과 관계 구조를 정의하고, PCB 공정 도메인 정보를 포함한 지식 모델 구축.
    key_features:
      - "불량 유형, 설비 이상 모드, 원인 공정, 영향, 대응 조치 간 관계를 온톨로지/지식그래프로 구조화"
      - "4M1E 분류체계(Man, Machine, Material, Method, Environment) 기반 원인 후보 체계적 구조화"
      - "FMEA 문서의 Failure Mode, Cause, Effect, Control, Action, Severity, Occurrence, Detection, RPN 정보를 온톨로지 객체로 변환·연계"
      - "AI 추론 결과를 PM, MES, SPC, RMS, APS 및 DT에 전달하는 의미 매핑 체계"

  digital_twin:
    name: "공정 디지털트윈 기반 통합 생산 운영 최적화"
    description: >
      핵심 공정의 실시간 가시화와 전체 제조 경로의 매크로 레이아웃 기반 흐름 통합을 대상으로,
      AI 에이전트가 수립한 생산계획 결과값을 가상 환경에서 사전 검증하고 최적의 공정 운영 대안을
      제시하는 디지털트윈 플랫폼.
    key_features:
      - "2D 블록 기반 공정 토폴로지 구성 및 실시간 미러링"
      - "비주얼 트윈(Visual Twin) 기반 공정 레이아웃 시각화"
      - "파일 기반 데이터 에뮬레이션 인터페이스로 레거시 시스템 연계"
      - "What-if 시뮬레이션 기반 긴급 LOT 투입 영향 사전 검증"
      - "병목 및 큐타임 탐지(Bottleneck/Q-Time Detect) 알고리즘"
      - "사이클 타임(Cycle Time) 오차 보정 알고리즘"
      - "고가용성(HA) 모니터링 데몬 및 자동 복구(Auto-Recovery)"

  ai_copilot:
    name: "제조 AI Copilot / Agentic AI Advisor"
    description: >
      CNC 등 제조 설비 도메인 데이터를 기반으로 LLM Fine-tuning을 수행하여 장비운용, 공정이해,
      오류대응에 특화된 지식 추론 모델을 구축. 작업자의 자연어 질의에 대해 상황 기반 정확한 응답 생성.
    key_features:
      - "ReAct 기반 추론 구조: 감지→추론→행동→관찰→판단 반복 루프"
      - "복수의 Tool(API)을 선택·조합하여 실행하는 통합 Agent 구조"
      - "알람/이벤트 발생 시 자동 상황 인지, 이력DB/매뉴얼/센서 데이터 조회하여 종합 판단"
      - "다국어(한국어, 영어, 일본어) 지원 AI Copilot"
      - "장비 매뉴얼 자동 QA 챗봇 및 공정 보고서 자동 생성"

  pdm_system:
    name: "예지보전 시스템"
    description: >
      진동, 온도, 전류/부하 이상 패턴을 탐지하는 비지도 학습 기반 이상감지 모델과
      설비 잔여수명(RUL) 예측 모델을 결합한 통합 예지보전 솔루션.
    key_features:
      - "다변량 센서 기반 상황 인지 (진동/온도/전류 데이터)"
      - "비지도 학습 기반 이상감지 모델"
      - "Edge Device에서 실시간 추론 및 알림"
      - "PM 시스템 연동 자동 보전 일정 업데이트"
      - "고장 원인, 보전 조치, 후속 생산 영향 결과를 지식 베이스에 피드백"
      - "정비 비용 30%+ 절감 실적"

  quality_ai:
    name: "품질 AI / 비전 검사 AI"
    description: >
      표면조도(Ra/Rz), 치수정밀도, 열변위 영향치를 예측하는 AI 모델과
      딥러닝 기반 미세 결함 탐지 비전 검사 시스템.
    key_features:
      - "센서신호 + CNC운용데이터 + 공정조건 결합 멀티모달 품질 예측 모델"
      - "공정별 품질 영향요인 분석(Feature Importance)"
      - "불량 발생 확률(%) 실시간 추론"
      - "미세 결함(0.1mm 이하) 탐지 딥러닝 모델"
      - "라인 속도 대응 실시간 검사 (100ms 이내 판정)"
      - "SPC 통계적 공정 관리 자동화"

  recipe_optimization:
    name: "공정조건 최적화 / Recipe AI"
    description: >
      AI 예측 결과 기반으로 Feedrate, Spindle 속도 등 절삭 조건을 자동 조정하고,
      RMS 시스템과 연동하여 Recipe를 자동 보정하는 시스템.
    key_features:
      - "다변량 공정 파라미터 최적화 (XGBoost / LSTM / Bayesian Optimization)"
      - "품질예측 결과 기반 실시간 공정조건 최적화"
      - "RMS 시스템 연동 Recipe 자동 반영"
      - "레시피 자동 추천 및 품질 예측 정확도 95%+"

