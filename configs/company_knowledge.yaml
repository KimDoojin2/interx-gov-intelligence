#  기술 표준 — AAS 등
# ═══════════════════════════════════════════════════════════════════

standards:
  aas:
    name: "자산관리쉘(Asset Administration Shell)"
    standard: "IEC 63278-1:2023"
    korea_standard: "KS X IEC 63278-1 (2025.7.31 제정)"
    description: >
      산업용 자산의 정보와 서비스를 표준화된 구조로 정의하고, 일관된 데이터 액세스 포인트를
      제공하기 위한 국제 표준. 제조 자산 전 생애주기 데이터를 관리하는 공용 컨테이너.
    interx_capability: >
      인터엑스는 AAS 기반 설비 데이터 표준화 기술을 보유하고 있으며,
