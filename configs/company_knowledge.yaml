#  섹션별 작성 가이드 — Gemini 프롬프트 품질 향상용
# ═══════════════════════════════════════════════════════════════════

writing_guide:
  general_rules:
    - "반드시 구체적 기술명, 표준명, 시장 데이터를 포함할 것"
    - "일반적인 표현('생산성 향상', '품질 개선') 대신 정량적 목표와 방법론을 기술"
    - "기존 기술(Level 2~3)의 한계점을 먼저 기술하고, 개발 기술(Level 4)의 차별점을 대비"
    - "국내외 기술 동향과 시장 데이터를 반드시 포함"
    - "경쟁사 분석을 통한 차별화 포인트 명시"
    - "AAS, 온톨로지, FMEA 등 핵심 기술 표준 언급 필수"
    - "각 세부목표에 3개 이상의 구체적 기술 개발 항목 포함"

  section_patterns:
    overview:
      pattern: >
        (기존 공정) 현재 한계점 → (개발 기술) 해결 방안 → 시스템 구성 설명
        → 세부 목표 나열 (각각 구체적 기술명 포함)
      min_length: 1500

    necessity:
      pattern: >
        기술/제품 정의 → 기존 공정의 문제점 → 국내 기술 동향 → 국내 시장 규모
        → 국외 기술 동향 → 국외 시장 규모 → 경쟁사 분석 → 인터엑스 차별점
      min_length: 2000

    goals:
      pattern: >
        최종 목표 → 세부 목표 1~N (각각: 기술명 + 3개 이상 세부 개발 항목)
        → 연차별 목표 → 성과 지표
      min_length: 2000

    strategy:
      pattern: >
        추진 전략 → 추진 체계 (PM / 기술개발팀 / 수요기업)
        → 기술개발팀 편성도 → 일정표
      min_length: 1000

    commercialization:
      pattern: >
        사업화 전략 → 목표 시장 규모 → 시장 진출 계획
        → 매출 전망 → 고용 창출 → 수출 계획
      min_length: 1000

    expected_effects:
      pattern: >
        정량적 기대효과 (KPI 수치 포함) → 정성적 기대효과
        → 성과 활용방안 → 파급효과
      min_length: 800
