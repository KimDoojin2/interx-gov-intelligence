# ═══════════════════════════════════════════════════════════════════════════════
#  사업계획서 템플릿 레지스트리 — 부처/사업별 실제 양식 기반
#
#  각 템플릿은 사용자가 제공한 실제 정부 사업계획서 양식에서 추출
#  공고 매칭: ministry_keywords + program_keywords로 공고→템플릿 자동 매핑
# ═══════════════════════════════════════════════════════════════════════════════

templates:

  # ── 산업통상자원부 (MOTIE) — KEIT/KETEP 전문기관 ──────────────────────────
  - id: motie_keit
    name: "산자부 기술개발사업 사업계획서"
    ministry_keywords:
      - "산업통상자원부"
      - "산업통상부"
      - "산자부"
    agency_keywords:
      - "한국산업기술기획평가원"
      - "KEIT"
      - "한국에너지기술평가원"
      - "KETEP"
    program_keywords:
      - "AI응용제품"
      - "상용화지원"
      - "기술개발"
      - "산업기술"
      - "에너지기술"
      - "소재부품"
    sections:
      - title: "1. 과제의 필요성"
        subsections:
          - "1-1. 개발 대상 기술·제품의 개요"
          - "1-2. 과제의 배경 및 필요성"
        guidance: >
          기술(제품)의 정의 및 범위를 서술하고, AI 기술 활용 요건(기계학습, 딥러닝, NLP,
          영상인식, 강화학습, 생성형AI 등)을 선택. 개발 배경과 필요성을 구체적으로 기술.
        fill_tables:
          - name: "AI 기술 활용 요건"
            type: "checkbox_grid"

      - title: "2. 과제의 목표 및 내용"
        subsections:
          - "2-1. 최종목표"
          - "2-2. 상용화 개발 목표 및 내용"
          - "2-3. 과제 수행일정 및 주요 결과물"
        guidance: >
          최종목표를 표/그림으로 요약. 상용화 기술(제품)의 성능 목표를 Spec별로 기재.
          성과지표(매출액/수주/일자리/기술이전)를 연도별 목표치로 작성.
          정량적 목표 항목의 평가방법 및 평가환경 기재.
          보안등급(보안과제/일반과제) 분류 및 해당 사유 작성.
          연차별 상용화 목표 및 개발 내용·범위를 기관별로 작성.
          간트 차트 형식의 수행일정 포함.
        fill_tables:
          - name: "상용화 기술(제품)의 성능 목표"
            type: "performance_matrix"
          - name: "상용화 성과의 지표 및 목표"
            type: "kpi_yearly"

      - title: "3. 과제의 추진전략·방법 및 추진체계"
        subsections:
          - "3-1. 상용화 개발 추진방법·전략"
          - "3-2. 상용화 개발 추진체계"
          - "3-3. 상용화 개발팀 편성도"
          - "3-4. 과제 수행 중 일자리 창출 계획·방법"
        guidance: >
          추진방법·전략을 구체적으로 기술. 추진체계를 이미지 또는 표로 제시.
          개발팀 편성도(주관기관, 공동기관별 책임자, 인원, 담당내용).
          일자리 창출 계획(채용년도, 채용일, 성명, 참여기간, 구분).
          청년(기본/추가) 채용 포함.

      - title: "4. 상용화 전략 및 계획"
        subsections:
          - "4-1. 국내·외 기술과 시장 현황"
          - "4-2. 관련 지식재산권, 표준화 및 인증기준 현황"
          - "4-3. 표준화 전략"
          - "4-4. 경제적 성과 창출계획"
          - "4-5. 사회적 가치 창출 계획"
        guidance: >
          국내외 기술(제품) 수준, 시장규모, 수출입 현황을 구체적 수치로 기술.
          수행기관/국내경쟁기관/국외경쟁기관의 지식재산권·표준화·인증 현황.
          생산계획(시장점유율, 판매량, 판매단가, 매출액) 연도별 작성.
          투자계획(매출원가, 판매관리비, 자본적지출) 연도별 작성.
          사업화 전략(형태/규모, 사업화능력, 계획/일정, 기대효과).
          사회적 가치 창출 계획(균형발전, 지역 파급효과).
        fill_tables:
          - name: "생산 계획"
            type: "yearly_plan"
          - name: "투자 계획"
            type: "yearly_plan"

      - title: "5. 성과의 활용방안 및 기대효과"
        subsections:
          - "5-1. 성과의 활용방안"
          - "5-2. 성과의 기대효과"
        guidance: >
          AI 응용제품·서비스의 성과 확산방안.
          과학·기술적 측면, 경제적·사회적 측면, 인프라 측면으로 구분하여 기대효과 기술.

      - title: "6. 안전 및 보안조치 이행계획"
        subsections:
          - "6-1. 안전조치 이행계획"
          - "6-2. 보안조치 이행계획"
        guidance: >
          연구소/연구실 단위 안전조치(안전책임자, 안전관리규정, 안전관리비, 사고대처).
          보안관리체계, 참여자 관리, 연구내용·결과 관리, 연구시설·정보통신망 관리.

      - title: "7. 수행기관 현황"
        subsections:
          - "7-1. 주관책임자 및 참여자 등 현황"
        guidance: >
          주관책임자 인적사항(학력, 경력, 국가R&D 실적, 논문/저서, 지식재산권, 수상경력).
          공동기관책임자 동일 양식. 참여자 현황표(기관, 성명, 직위, 학위, 담당역할, 인건비계상률).
        skip_ai_content: true

      - title: "별첨4. 기술준비도(TRL) 목표"
        subsections:
          - "핵심기술요소(CTE) 목록"
          - "CTE별 TRL 목표"
        guidance: >
          핵심기술요소(CTE) 정의. 각 CTE별 TRL 단계(1~9) 목표.
          단계별 시험평가 주체, 평가항목, 생산수준, 시험평가 환경 기재.


  # ── 중소벤처기업부 (MSS/TIPA) — 연구개발계획서 ──────────────────────────────
  - id: tipa_rnd
    name: "중소기업 기술개발(R&D) 연구개발계획서"
    ministry_keywords:
      - "중소벤처기업부"
      - "중기부"
    agency_keywords:
      - "기술보증기금"
      - "중소기업기술정보진흥원"
      - "TIPA"
      - "창업진흥원"
    program_keywords:
      - "중소기업"
      - "기술개발"
      - "R&D"
      - "PoC"
      - "시범연구"
      - "Multi AI Agent"
      - "제조 특화"
    sections:
      - title: "과제 개요"
        subsections: []
        guidance: >
          지원사업명, 과제명, 주관연구개발기관명, 수요기업명.
          중소제조 특화산업 해당 분야 선택(식품/뷰티/제약/자동차부품/섬유패션/생활소비재/기계장비/금속가공).
          핵심 Task(35대 분류체계 활용), 개발 목표, 개발 방법, 연구팀 구성, 기대효과.
        skip_ai_content: true

      - title: "자가진단"
        subsections: []
        guidance: >
          신청자격 부합여부, 서류제출, 참여제한, 인건비유용 이력, 부도/휴폐업,
          세금체납, 채무불이행, 파산/회생, 부채비율, 보안과제 해당여부 등 10개 항목 체크.
        skip_ai_content: true

      - title: "1. 기술개발 목표"
        subsections:
          - "연구개발과제의 필요성"
          - "연구개발과제의 차별성"
          - "성과지표 및 목표치"
          - "평가방법 및 평가환경"
        guidance: >
          최대 1페이지. 필요성(국내외 현황, 문제점, 정책 연관성), 차별성(독창성, 기존기술 비교).
          핵심 KPI 성과지표 필수 포함: 공정최적화율, 작업자생산성향상률, 불량률감소율,
          설비가동개선률, 긴급상황대응시간단축율, 운영비용절감률, AI Data 확보량(TB),
          개발 AI Agent 수(개). 산출식·산출근거 명시.
          성과지표별 가중치(합계 100%), 세계최고수준, 국내수준, 목표치.
        fill_tables:
          - name: "핵심 KPI"
            type: "kpi_matrix"
          - name: "성과지표 목표치"
            type: "performance_matrix"

      - title: "2. 연구개발 방법"
        subsections:
          - "기술개발 사항"
          - "실증 사항"
          - "AI 에이전트 개발 내용"
        guidance: >
          최대 4페이지. PoC 시범연구 결과의 검증 방법과 계획 필수 포함.
          컨소시엄 및 기관별 개발내용 구분 작성. 실증계획(현장사진/동영상 첨부).
          업종별 핵심 제조공정의 2개 이상 AI 에이전트 개발하고 Multi AI Agent
          End-to-End(E2E) 연동 프로토타입 개발내용 필수.
          중소기업 35대 제조 AI 분류체계 참고(인식/예측/자동화/소통/생성).
        fill_tables:
          - name: "35대 제조 AI 분류체계"
            type: "reference_matrix"

      - title: "3. 추진일정 및 추진체계"
        subsections:
          - "추진일정"
          - "추진체계"
          - "참여인력"
        guidance: >
          연구개발 수행 일정(간트차트). 연구기관별 역할 분담.
          참여인력 현황(직위, 전공, 참여율 등).

      - title: "4. 확산 및 성과 활용 계획"
        subsections:
          - "확산 계획"
          - "기대효과"
        guidance: >
          연구개발 성과물의 확산 방안 및 활용 계획.

      - title: "5. 연구개발기관 역량"
        subsections:
          - "기관 개요"
          - "유사과제 수행실적"
          - "연구시설 및 장비"
        guidance: >
          연구개발기관 현황 및 역량. 유사과제 수행실적.
        skip_ai_content: true


  # ── 스마트제조혁신추진단 (AX Sprint) — AI응용제품 신속상용화 ─────────────────
  - id: ax_sprint
    name: "AX Sprint 사업계획서 (AI응용제품 신속상용화)"
    ministry_keywords:
      - "산업통상자원부"
      - "산업통상부"
      - "산자부"
    agency_keywords:
      - "스마트제조혁신추진단"
      - "KOSMO"
      - "한국스마트제조산업협회"
    program_keywords:
      - "AX Sprint"
      - "AI응용제품 신속 상용화"
      - "AI응용제품 신속상용화"
      - "스마트공장"
      - "스마트제조"
      - "제조AI"
      - "제조 AI"
      - "smart-factory"
    sections:
      - title: "1. 사업 개요"
        subsections:
          - "AI 응용제품/서비스 개요"
          - "AS-IS / TO-BE 비교"
          - "제조 AI 응용제품 구축 목표수준"
          - "정부 지원 시급성"
          - "제안 테마"
          - "제조공정/제품/서비스 현황"
          - "스마트공장 지원 이력 및 활용현황"
        guidance: >
          AI 응용제품/서비스 현 수준(AS-IS) 및 구현 목표(TO-BE)를 그림+텍스트로 제시.
          AI 목표 수준(1단계:인식→2단계:예측→3단계:자동화→4단계:소통→5단계:생성) 선택.
          제안 테마 선택(제조산업안전AX/제조공정생산AX/제조관리경영AX/소비자맞춤형AX).
          주요+부가 테마 간 연계성 도식화. 현장 여건, 데이터·설비 환경 분석.
          과거 스마트공장 지원 이력 및 자체 투자 이력.
        fill_tables:
          - name: "AS-IS / TO-BE 비교표"
            type: "comparison"
          - name: "AI 목표 수준"
            type: "level_selection"

      - title: "2. 세부 추진계획"
        subsections:
          - "AI 응용제품 기술 적용 개요"
          - "AI 응용제품 목표시스템 구성도"
          - "AI 적용 대상 방안 계획"
          - "AI 응용제품/서비스 세부 내용"
          - "AI 기능로직 시나리오"
          - "HW 구성도"
          - "AI 및 SW 구성도"
          - "기존 시스템과 AI 기술 적응 및 통합 계획"
          - "장비도입 계획"
        guidance: >
          핵심 AI 기술 선택(기계학습/딥러닝/NLP/음성인식/영상인식/강화학습/생성형AI 등).
          목표시스템 구성도(그림). AS-IS vs TO-BE 비교표(기능별 기대효과).
          AI 기능로직 시나리오(기능명, 적용공정, 기능목적, 적용기술, 입력데이터,
          출력결과, 운영시나리오, 예상효과). HW/SW 구성도.
          연차별(1년차/2년차) AI 적용 방안 및 주요 결과물.
        fill_tables:
          - name: "AI 기술 체크리스트"
            type: "checkbox_grid"
          - name: "AS-IS vs TO-BE"
            type: "comparison"
          - name: "AI 기능로직 시나리오"
            type: "scenario"

      - title: "3. 추진 일정 및 추진 체계"
        subsections:
          - "추진 일정"
          - "추진 체계"
          - "참여 인력"
        guidance: >
          간트차트 형식 추진일정. 컨소시엄 체계(도입기업, 공급기업, 참여기관).
          역할 분담 및 참여인력.

      - title: "4. 확산 및 성과 활용 계획"
        subsections:
          - "AI 제품/서비스 상용화 확산 계획"
          - "상용화 후 예상 성과"
          - "글로벌화 전략 방안"
          - "소유권 확보 방안"
          - "기대효과"
          - "사회 공헌 방안"
          - "벤치마킹 제공 방안"
        guidance: >
          확산 계획(도입기업/공급기업 구분). 예상 성과(매출, 생산성, 거래처).
          글로벌 수출 목표. 지식재산권 소유권 확보 방안.
          경제·산업적, 사회적 측면 기대효과.
          ESG 기반 사회 공헌 방안. 벤치마킹 제공 방안.

      - title: "5. 지원계획"
        subsections:
          - "유지관리 및 하자보수 계획"
          - "사업실패 시 조치계획"
          - "고용유지 및 고용창출 계획"
          - "안전 및 보안대책"
        guidance: >
          유지보수 범위(Panel/SW), 유상/무상 구분, 세부내용(정기점검/수시점검/성능점검).
          사업실패 시 도입기업/공급기업 책임분담 조치계획.
          고용현황표(구축전년/해당년/후1년/후2년 신규고용/상시고용).
          안전조치·보안조치 이행계획.
        fill_tables:
          - name: "고용 현황"
            type: "yearly_plan"

      - title: "6. 예산 계획"
        subsections: []
        guidance: "예산 계획은 별도 작성"
        skip_ai_content: true

      - title: "부록. 성과지표(KPI)"
        subsections:
          - "핵심지표(P/Q/C/D 중 1개 이상)"
          - "특화지표(7개 중 1개 이상)"
          - "테마별 자율지표(2개 이상)"
        guidance: >
          핵심지표: 시간당생산량증가율(P), 공정불량률감소(Q), 재공재고율절감률(C), 납기단축률(D).
          특화지표: AI적용률, 환산재해율감소, 위험상황대응리드타임단축, 설비종합효율(OEE) 등.
          각 지표별 정의, 측정산식, 증빙방법 기재.
          과제별 핵심+특화+자율지표 총 4개 이상.
        fill_tables:
          - name: "KPI 지표"
            type: "kpi_matrix"


