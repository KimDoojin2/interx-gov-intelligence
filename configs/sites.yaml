sites:
  - code: bizinfo
    name: 기업마당
    enabled: true
    collector_type: requests
  - code: ntis
    name: NTIS
    enabled: false
    collector_type: requests
  - code: iris
    name: IRIS (국가연구개발사업)
    enabled: false   # 2025~ 로그인 필수 페이지로 변경 — 공개 수집 불가
    collector_type: requests
  - code: kiat
    name: KIAT (한국산업기술진흥원)
    enabled: true
    collector_type: playwright
  - code: smba
    name: 중소벤처기업부
    enabled: false   # ConnectTimeout / ConnectionReset — 서버측 차단
    collector_type: requests
  - code: nipa
    name: NIPA (정보통신산업진흥원)
    enabled: true
    collector_type: requests
  - code: innopolis
    name: 연구개발특구진흥재단
    enabled: true
    collector_type: requests
  - code: bipa
    name: 부산정보산업진흥원
    enabled: true
    collector_type: requests
  - code: uipa
    name: 울산정보산업진흥원
    enabled: true
    collector_type: requests
  - code: gicon
    name: 광주전남연구원
    enabled: true
    collector_type: requests
  - code: ttp
    name: 대전테크노파크 (djtp.or.kr)
    enabled: true
    collector_type: requests
  - code: dicia
    name: DICIA (의료기기산업협회)
    enabled: false   # 제조AI 범위 외 — 비활성
    collector_type: playwright
  - code: gjtp
    name: 광주테크노파크
    enabled: true
    collector_type: requests
  - code: gbtp
    name: 경북테크노파크
    enabled: false   # Colab GCP IP 차단 (requests/playwright 모두 0건)
  - code: jntp
    name: 전남테크노파크
    enabled: false   # ConnectTimeout / ConnectionReset — 서버측 차단
    collector_type: requests
  - code: jbtp
    name: 전북테크노파크
    enabled: false   # ConnectTimeout / ConnectionReset — 서버측 차단
    collector_type: requests
  - code: jejutp
    name: 제주테크노파크
    enabled: true
    collector_type: requests
  - code: nrf
    name: 한국연구재단
    enabled: false   # 500 서버 에러 / AJAX 기반 목록 — URL 재조사 필요
    collector_type: requests
  - code: kised
    name: 창업진흥원 (k-startup.go.kr)
    enabled: true
    collector_type: requests
  - code: ketep
    name: 에너지기술평가원
    enabled: true
    collector_type: playwright  # 2025~ /businessAcment URL로 변경, Playwright 필수
  - code: koiia
    name: 산업지능화협회
    enabled: true
    collector_type: requests
  - code: smart_factory
    name: 스마트제조혁신추진단 (smart-factory.kr)
    enabled: true
    collector_type: playwright  # React/Ant Design SPA — Playwright 필수
  - code: iitp
    name: 정보통신기획평가원 (iitp.kr)
    enabled: true
    collector_type: playwright   # Vue.js SPA — AI·반도체·6G 과제 공고
  # ── 테크노파크 12개 (v3.1 신규) ──
  - code: seoultp
    name: 서울테크노파크
    enabled: true
    collector_type: requests
  - code: gtp
    name: 경기테크노파크
    enabled: false   # 404 에러 — URL 재조사 필요
    collector_type: requests
  - code: gdtp
    name: 경기대진테크노파크
    enabled: true
    collector_type: requests
  - code: itp
    name: 인천테크노파크
    enabled: false   # ConnectTimeout — 서버측 차단 또는 URL 변경
    collector_type: requests
  - code: gwtp
    name: 강원테크노파크
    enabled: false   # 404 에러 — URL 재조사 필요
    collector_type: requests
  - code: sjtp
    name: 세종테크노파크
    enabled: false   # 0건 수집 — 게시판 구조 변경 추정
    collector_type: requests
  - code: cbtp
    name: 충북테크노파크
    enabled: false   # SSL DH_KEY_TOO_SMALL 에러
    collector_type: requests
  - code: ctp
    name: 충남테크노파크
    enabled: true
    collector_type: requests
  - code: btp
    name: 부산테크노파크
    enabled: true
    collector_type: requests
  - code: utp
    name: 울산테크노파크
    enabled: false   # 비공고 페이지 수집 (건물안내/부서/CI 등) — URL 재조사 필요
    collector_type: requests
  - code: gntp
    name: 경남테크노파크
    enabled: false   # 404 에러 — URL 재조사 필요
    collector_type: requests
  - code: ptp
    name: 포항테크노파크
    enabled: false   # 404 에러 — URL 재조사 필요
    collector_type: requests

  - code: mock
    name: 테스트 목업
    enabled: false
    collector_type: mock
