<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InterX BD Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 900: '#0A1628', 800: '#0F1E35', 700: '#152742', 600: '#1B3050' },
                        cyan: { 400: '#00CFFF', 500: '#00B8E6', 600: '#009FCC' },
                        gold: { 400: '#FFD700', 500: '#E6C200' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        body { background: #0A1628; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15,30,53,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0,207,255,0.1); }
        .glow { box-shadow: 0 0 20px rgba(0,207,255,0.08); }
        .grade-a { color: #00FF88; } .grade-b { color: #00CFFF; }
        .grade-c { color: #FFD700; } .grade-d { color: #FF6B6B; }
        .badge-a { background: rgba(0,255,136,0.15); color: #00FF88; border: 1px solid rgba(0,255,136,0.3); }
        .badge-b { background: rgba(0,207,255,0.15); color: #00CFFF; border: 1px solid rgba(0,207,255,0.3); }
        .badge-c { background: rgba(255,215,0,0.15); color: #FFD700; border: 1px solid rgba(255,215,0,0.3); }
        .badge-d { background: rgba(255,107,107,0.15); color: #FF6B6B; border: 1px solid rgba(255,107,107,0.3); }
        .badge-l3 { background: rgba(255,0,100,0.15); color: #FF0064; border: 1px solid rgba(255,0,100,0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0A1628; }
        ::-webkit-scrollbar-thumb { background: #1B3050; border-radius: 3px; }
        .nav-link { transition: all 0.2s; }
        .nav-link:hover { background: rgba(0,207,255,0.1); }
        .nav-link.active { background: rgba(0,207,255,0.15); border-left: 3px solid #00CFFF; }
        .kpi-card { transition: transform 0.2s; }
        .kpi-card:hover { transform: translateY(-2px); }
        .table-row { transition: background 0.15s; }
        .table-row:hover { background: rgba(0,207,255,0.05); }
        .progress-bar { background: linear-gradient(90deg, #00CFFF, #00FF88); }
    </style>
</head>
<body class="min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-60 glass border-r border-navy-600 flex flex-col fixed h-full z-10">
            <div class="p-5 border-b border-navy-600">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-cyan-400/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-bold text-white">InterX BD</h1>
                        <p class="text-[10px] text-gray-500">Intelligence Platform</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 p-3 space-y-1">
                <a href="/" class="nav-link {% if active == 'dashboard' %}active{% endif %} flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm">
                    <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="/notices" class="nav-link {% if active == 'notices' %}active{% endif %} flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm">
                    <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Notices
                </a>
                <a href="/notices?l3=true" class="nav-link {% if active == 'l3' %}active{% endif %} flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm">
                    <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>
                    L3 Strong
                </a>
                <a href="/notices?urgent=true" class="nav-link {% if active == 'urgent' %}active{% endif %} flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm">
                    <svg class="w-4 h-4 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Urgent (D-7)
                </a>
                <a href="/pipeline" class="nav-link {% if active == 'pipeline' %}active{% endif %} flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm">
                    <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Pipeline
                </a>
            </nav>
            <div class="p-4 border-t border-navy-600 text-[10px] text-gray-600">
                InterX Engine v4.5
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-60">
            <header class="glass border-b border-navy-600 px-6 py-3 flex items-center justify-between sticky top-0 z-10">
                <h2 class="text-lg font-semibold text-white">{% block header %}Dashboard{% endblock %}</h2>
                <div class="flex items-center gap-4">
                    <div id="sync-status" class="text-xs text-gray-500"></div>
                    <button onclick="location.reload()" class="text-xs px-3 py-1.5 rounded-md bg-navy-700 hover:bg-navy-600 text-gray-400 transition">
                        Refresh
                    </button>
                </div>
            </header>
            <div class="p-6">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
